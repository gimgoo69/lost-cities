<!DOCTYPE html>

<head>

    <style>
        body { margin: 0; padding: 0; background: #0d1217; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; user-select: none; touch-action: none; overscroll-behavior: none; }
        #game-wrapper { width: 1400px; height: 950px; background: linear-gradient(135deg, #18232e 0%, #0d1217 100%); position: relative; display: flex; flex-direction: column; padding: 10px 20px; box-sizing: border-box; transform-origin: center center; box-shadow: 0 0 50px rgba(0,0,0,0.8); color: #fff; text-align: center; flex-shrink: 0; }
        
        #landscape-warning { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0d1217; color: #f1c40f; z-index: 100000000; justify-content: center; align-items: center; flex-direction: column; font-size: 24px; font-weight: bold; text-align: center; line-height: 1.5; }

            #game-wrapper { display: none !important; }
            #landscape-warning { display: flex; }
        }

        h1 { font-size: 24px; color: #f1c40f; text-shadow: 0 2px 10px rgba(241, 196, 15, 0.4); margin: 0 0 5px 0; }
        .score-board { font-size: 20px; font-weight: bold; background: rgba(30, 40, 50, 0.9); color: #f1c40f; display: inline-block; padding: 6px 30px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.6); margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .info-panel { background: rgba(20, 30, 40, 0.8); color: #ecf0f1; padding: 8px 15px; border-radius: 10px; margin: 0 auto 10px auto; font-weight: bold; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; }
        .toast-notification { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); color: white; padding: 15px 40px; border-radius: 30px; font-size: 22px; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 20px rgba(46,204,113,0.5); z-index: 9999999; display: none; opacity: 0; border: 2px solid #fff; transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: none; }
        .main-container { flex: 1; display: flex; width: 100%; gap: 15px; min-height: 0; }
        .game-table { flex: 3; display: flex; flex-direction: column; gap: 8px; position: relative; transition: opacity 0.3s ease; }
        .game-table.waiting { opacity: 0.5; pointer-events: none; }
        .section { background: rgba(30, 40, 50, 0.5); padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .section h3 { margin: 0 0 8px 0; font-size: 14px; color: #f1c40f; text-align: left; padding-left: 5px; }
        .grid-5 { display: flex; justify-content: space-between; gap: 8px; flex: 1; min-height: 0; }
        .column { flex: 1; min-height: 0; background: rgba(15, 20, 25, 0.8); border: 2px solid; border-radius: 10px; padding: 6px 4px; position: relative; display: flex; flex-direction: column; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); z-index: 1; }
        .column:hover { z-index: 100; }
        .col-red { border-color: rgba(231, 76, 60, 0.4); } .col-blue { border-color: rgba(52, 152, 219, 0.4); } .col-green { border-color: rgba(46, 204, 113, 0.4); } .col-yellow { border-color: rgba(241, 196, 15, 0.4); } .col-white { border-color: rgba(236, 240, 241, 0.3); }
        .column-header { pointer-events: none; min-height: 60px; margin-bottom: 2px; position: relative; z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
        .column h4 { margin: 0; font-size: 16px; color: #f1c40f; font-weight: 900; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .history-badge { display: inline-block; font-size: 13px; color: #fff; background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 5px; margin-top: 5px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
        .stacked-container { position: relative; width: 100%; flex: 1; min-height: 105px; display: flex; justify-content: center; z-index: 20; }
        .stacked-card { position: absolute; left: 50%; margin-left: -29px; top: calc(var(--card-idx) * 4px); transition: top 0.3s ease, transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease; z-index: var(--card-idx); }
        .stacked-container:hover .stacked-card { top: calc(15px + var(--card-idx) * 26px); box-shadow: 0 8px 16px rgba(0,0,0,0.6); }
        .stacked-container .stacked-card:hover { transform: translateY(-10px) scale(1.25) !important; box-shadow: 0 20px 40px rgba(0,0,0,1) !important; z-index: 1000 !important; }
        .stacked-container:has(.stacked-card:hover) .stacked-card:not(:hover):has(~ .stacked-card:hover) { transform: translateY(-35px) !important; }
        .stacked-container .stacked-card:hover ~ .stacked-card { transform: translateY(35px) !important; z-index: calc(500 - var(--card-idx)) !important; }
        .card-list { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; min-height: 100px; padding-bottom: 10px; align-items: center; position: relative; }
        .card { width: 58px; height: 90px; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; font-weight: bold; font-size: 15px; cursor: pointer; border: 1.5px solid #000; box-shadow: 0 4px 8px rgba(0,0,0,0.8), inset 0 0 5px rgba(255,255,255,0.3); background-size: cover; background-position: center; background-repeat: no-repeat; image-rendering: -webkit-optimize-contrast; image-rendering: high-quality; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card .card-num { margin: 4px 0 0 0; font-size: 18px; font-weight: 900; } .card .card-bg-label { margin: 0 0 4px 0; font-size: 9px; background: rgba(0,0,0,0.7); padding: 2px 4px; border-radius: 3px; }
        .card:hover { transform: translateY(-10px) scale(1.08); box-shadow: 0 10px 20px rgba(0,0,0,1); z-index: 999 !important; }
        .card.selected { border: 3px solid #f1c40f !important; transform: translateY(-15px) scale(1.12) !important; box-shadow: 0 15px 30px rgba(241, 196, 15, 0.5); z-index: 999 !important; }
        .card.flying-effect { position: absolute !important; z-index: 99999 !important; pointer-events: none !important; box-shadow: 0 20px 40px rgba(0,0,0,0.8) !important; margin-left: 0 !important; transition: left 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), top 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.35s ease, opacity 0.35s ease !important; }
        .card.red { color: #ff9999; border-color: #c0392b; } .card.blue { color: #99ccff; border-color: #2980b9; } .card.green { color: #99ff99; border-color: #27ae60; } .card.yellow { color: #ffee99; border-color: #f39c12; } .card.white { color: #ffffff; border-color: #bdc3c7; }
        .chat-container { flex: 1; max-width: 350px; background: rgba(30, 40, 50, 0.6); border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); padding: 12px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .chat-messages { flex: 1; overflow-y: auto; border: 1px solid rgba(0,0,0,0.3); border-radius: 8px; padding: 10px; text-align: left; background: rgba(15, 20, 25, 0.8); font-size: 13px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 6px; }
        .chat-input-area { display: flex; gap: 6px; } .chat-input { flex: 1; padding: 8px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; font-size: 13px; background: rgba(0,0,0,0.5); color: white; outline: none; } .chat-btn { background: #f1c40f; color: #101518; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .action-panel { display: none; gap: 15px; justify-content: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20, 30, 40, 0.95); padding: 20px 40px; border-radius: 15px; border: 2px solid #f1c40f; box-shadow: 0 10px 40px rgba(0,0,0,0.9), 0 0 30px rgba(241,196,15,0.4); z-index: 9999; }
        .btn { padding: 10px 25px; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; color: white; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); } .btn:hover { transform: translateY(-2px); } .btn-play { background: #2ecc71; } .btn-discard { background: #e67e22; }
        @keyframes fadeOverlay { from { background: rgba(0,0,0,0); backdrop-filter: blur(0px); } to { background: rgba(6, 10, 15, 0.88); backdrop-filter: blur(15px); } }
        @keyframes popupBox { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes pulseRestartBtn { 0% { box-shadow: 0 5px 15px rgba(0,0,0,0.4), 0 0 0px rgba(241,196,15,0); } 50% { box-shadow: 0 8px 25px rgba(0,0,0,0.6), 0 0 20px rgba(241,196,15,0.5); } 100% { box-shadow: 0 5px 15px rgba(0,0,0,0.4), 0 0 0px rgba(241,196,15,0); } }
        .result-overlay, .turn-overlay, .ai-modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999; justify-content: center; align-items: center; color: white; animation: fadeOverlay 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .result-box { background: rgba(25, 35, 45, 0.95); padding: 50px 60px; border-radius: 28px; border: 3px solid #f1c40f; max-width: 550px; width: 90%; text-align: center; box-shadow: 0 30px 70px rgba(0,0,0,0.9); animation: popupBox 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; box-sizing: border-box; }
        .result-title { font-size: 44px; font-weight: 900; margin-bottom: 25px; letter-spacing: -1px; text-shadow: 0 4px 15px rgba(0,0,0,0.7); }
        .result-scores { font-size: 22px; margin: 30px 0; line-height: 2; text-align: left; background: rgba(10, 15, 20, 0.6); padding: 20px 25px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.07); box-shadow: inset 0 0 20px rgba(0,0,0,0.4); }
        .btn-restart { background: linear-gradient(135deg, #f1c40f 0%, #d4ac0d 100%); color: #0d1217; font-size: 20px; padding: 15px 45px; border-radius: 14px; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); font-weight: 900; transition: transform 0.2s ease, background 0.2s; animation: pulseRestartBtn 2s infinite ease-in-out; } .btn-restart:hover { transform: scale(1.05); background: linear-gradient(135deg, #fce136 0%, #f1c40f 100%); }
        .tutorial-floating-box { display: none; position: absolute; top: 70px; right: 380px; width: 340px; background: rgba(15, 25, 35, 0.95); border: 2px solid #3498db; border-radius: 12px; padding: 20px; color: #ecf0f1; text-align: left; box-shadow: 0 15px 40px rgba(0,0,0,0.9); z-index: 99990; font-size: 14px; line-height: 1.6; pointer-events: auto; }
